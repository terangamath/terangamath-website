name: Build & Push Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'

# Permissions nécessaires pour écrire sur GHCR avec le GITHUB_TOKEN
permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: terangamath/terangamath-website

jobs:
  # ─────────────────────────────────────────
  # Job 1 : Build React et vérification
  # ─────────────────────────────────────────
  build-app:
    name: Build React app
    runs-on: ubuntu-latest

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Récupère tous les tags pour semver tagging

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Build de l'application
        run: npm run build

      # Mettre le dossier dist en cache pour le job Docker
      - name: Mettre dist en cache
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 2 : Build et push de l'image Docker
  # ─────────────────────────────────────────
  build-push-docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: build-app   # Démarre uniquement si le build React a réussi

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4

      # Activer BuildKit pour les builds multi-stage optimisés
      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      # Authentification sur GHCR avec le GITHUB_TOKEN (aucun secret manuel requis)
      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Génère automatiquement les tags et labels OCI standards
      - name: Extraire les métadonnées Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Tag semver sur push de tag Git (v1.0.0 -> 1.0.0)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            # Tag avec le SHA court du commit (ex: sha-a1b2c3d)
            type=sha,prefix=sha-,format=short
            # Tag latest sur chaque push sur main
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Build multi-stage + push (utilise le cache Docker pour accélérer les rebuilds)
      - name: Build et push de l'image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # Afficher le digest de l'image poussée pour traçabilité
      - name: Résumé du déploiement
        run: |
          echo "### Image Docker publiée" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Registry**: \`${{ env.REGISTRY }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "${{ steps.meta.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY
