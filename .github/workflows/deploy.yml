name: Build & Push Docker image

on:
  push:
    branches:
      - main
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+*'
    paths-ignore:
      - 'docs/**'
      - '**.md'
      - 'k8s/**'
      - '.gitignore'
  pull_request:
    branches:
      - main

# Permissions nécessaires pour écrire sur GHCR et créer des tags Git
permissions:
  contents: write
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: terangamath/terangamath-website

jobs:
  # ─────────────────────────────────────────
  # Job 1 : Build React et vérification
  # ─────────────────────────────────────────
  build-app:
    name: Build React app
    runs-on: ubuntu-latest
    if: "!startsWith(github.event.head_commit.message, 'chore(deploy):')"

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Installer les dépendances
        run: npm ci

      - name: Build de l'application
        run: npm run build

      # Mettre le dossier dist en cache pour le job Docker
      - name: Mettre dist en cache
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
          retention-days: 1

  # ─────────────────────────────────────────
  # Job 2 : Création automatique du tag semver
  # Uniquement sur push sur main (pas sur les tags ni les PRs)
  # ─────────────────────────────────────────
  auto-tag:
    name: Auto-tag semver
    runs-on: ubuntu-latest
    needs: build-app
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    outputs:
      new_tag: ${{ steps.bump.outputs.new_tag }}
      new_version: ${{ steps.bump.outputs.new_version }}

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Calculer et créer le prochain tag patch
        id: bump
        run: |
          # Récupérer le dernier tag semver, défaut à v1.0.0 si aucun
          LAST_TAG=$(git tag -l 'v[0-9]*.[0-9]*.[0-9]*' | sort -V | tail -1)

          if [ -z "$LAST_TAG" ]; then
            NEW_TAG="v1.0.0"
          else
            # Incrémenter le patch (v1.0.3 → v1.0.4)
            MAJOR=$(echo $LAST_TAG | cut -d. -f1 | tr -d 'v')
            MINOR=$(echo $LAST_TAG | cut -d. -f2)
            PATCH=$(echo $LAST_TAG | cut -d. -f3)
            NEW_TAG="v${MAJOR}.${MINOR}.$((PATCH + 1))"
          fi

          # Extraire la version sans le préfixe 'v'
          NEW_VERSION="${NEW_TAG#v}"

          echo "Dernier tag : ${LAST_TAG:-aucun}"
          echo "Nouveau tag : $NEW_TAG"
          echo "new_tag=$NEW_TAG" >> $GITHUB_OUTPUT
          echo "new_version=$NEW_VERSION" >> $GITHUB_OUTPUT

          # Créer et pousser le tag
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag $NEW_TAG
          git push origin $NEW_TAG

  # ─────────────────────────────────────────
  # Job 3 : Build et push de l'image Docker
  # Déclenché soit par le tag auto (main), soit par un tag manuel
  # ─────────────────────────────────────────
  build-push-docker:
    name: Build & Push Docker image
    runs-on: ubuntu-latest
    needs: [build-app, auto-tag]
    if: always() && needs.build-app.result == 'success' && (needs.auto-tag.result == 'success' || (needs.auto-tag.result == 'skipped' && github.event_name != 'pull_request'))

    steps:
      - name: Checkout du code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Connexion à GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # When triggered by main push (auto-tag), use the auto-tag version.
      # When triggered by a tag push, use semver from the git ref.
      # When triggered by PR, only build without pushing (no semver tags).
      - name: Determine semver tags from auto-tag
        if: needs.auto-tag.result == 'success'
        id: semver-tags
        run: |
          VERSION="${{ needs.auto-tag.outputs.new_version }}"
          MAJOR=$(echo "$VERSION" | cut -d. -f1)
          MINOR=$(echo "$VERSION" | cut -d. -f2)
          PATCH=$(echo "$VERSION" | cut -d. -f3)
          echo "full=${VERSION}" >> $GITHUB_OUTPUT
          echo "major_minor=${MAJOR}.${MINOR}" >> $GITHUB_OUTPUT
          echo "major=${MAJOR}" >> $GITHUB_OUTPUT

      - name: Extraire les métadonnées Docker (auto-tag)
        if: needs.auto-tag.result == 'success'
        id: meta-auto
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=${{ needs.auto-tag.outputs.new_version }}
            type=raw,value=${{ steps.semver-tags.outputs.major_minor }}
            type=raw,value=${{ steps.semver-tags.outputs.major }}
            type=raw,value=latest
            type=sha,prefix=sha-,format=short

      - name: Extraire les métadonnées Docker (tag push)
        if: needs.auto-tag.result == 'skipped'
        id: meta-tag
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix=sha-,format=short
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build et push de l'image (auto-tag)
        if: needs.auto-tag.result == 'success'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-auto.outputs.tags }}
          labels: ${{ steps.meta-auto.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build et push de l'image (tag push)
        if: needs.auto-tag.result == 'skipped'
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-tag.outputs.tags }}
          labels: ${{ steps.meta-tag.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Résumé du déploiement
        if: always()
        run: |
          echo "### Image Docker publiée" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Image**: \`${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}\`" >> $GITHUB_STEP_SUMMARY
          echo "**Tags**:" >> $GITHUB_STEP_SUMMARY
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          if [ "${{ needs.auto-tag.result }}" = "success" ]; then
            echo "${{ steps.meta-auto.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "${{ steps.meta-tag.outputs.tags }}" >> $GITHUB_STEP_SUMMARY
          fi
          echo "\`\`\`" >> $GITHUB_STEP_SUMMARY
          echo "**Commit**: \`${{ github.sha }}\`" >> $GITHUB_STEP_SUMMARY