apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: terangamath
  namespace: terangamath-prod
  annotations:
    # Nginx Ingress Controller
    nginx.ingress.kubernetes.io/rewrite-target: /
    # TLS géré par cert-manager (Let's Encrypt) — supprimer si non utilisé
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - www.terangamath.org
      secretName: terangamath-tls  # Secret créé automatiquement par cert-manager
  rules:
    - host: www.terangamath.org
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: terangamath
                port:
                  number: 80
