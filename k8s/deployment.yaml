apiVersion: apps/v1
kind: Deployment
metadata:
  name: terangamath
  labels:
    app: terangamath
spec:
  replicas: 2
  selector:
    matchLabels:
      app: terangamath
  template:
    metadata:
      labels:
        app: terangamath
    spec:
      containers:
        - name: app
          image: ghcr.io/terangamath/terangamath-website:latest
          imagePullPolicy: Always
          ports:
            - containerPort: 8080
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
          livenessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 8080
            initialDelaySeconds: 3
            periodSeconds: 5
      # Authentification GHCR pour image privée
      imagePullSecrets:
        - name: ghcr-pull-secret
